<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>实训经验分享演讲辅助台</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #070908;
      --panel: #101514;
      --panel-strong: #151c1a;
      --line: rgba(210, 238, 229, 0.16);
      --line-strong: rgba(210, 238, 229, 0.28);
      --text: #edf8f3;
      --muted: #a9bab3;
      --soft: #6f827b;
      --accent: #38e7c0;
      --accent-2: #f6b94b;
      --accent-3: #ff7d68;
      --ok: #8de36e;
      --shadow: rgba(0, 0, 0, 0.34);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--bg);
    }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--text);
      background:
        linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.028) 1px, transparent 1px),
        linear-gradient(135deg, #050706 0%, #0c1210 45%, #12110c 100%);
      background-size: 38px 38px, 38px 38px, auto;
    }

    button {
      font: inherit;
    }

    .app {
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr);
      min-height: 100vh;
    }

    .sidebar {
      position: sticky;
      top: 0;
      display: grid;
      grid-template-rows: auto 1fr auto;
      height: 100vh;
      padding: 28px 18px;
      border-right: 1px solid var(--line);
      background: rgba(7, 9, 8, 0.88);
      backdrop-filter: blur(18px);
    }

    .brand {
      padding: 0 8px 20px;
      border-bottom: 1px solid var(--line);
    }

    .brand__meta {
      margin: 0 0 12px;
      color: var(--accent);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .brand h1 {
      margin: 0;
      font-size: 1.35rem;
      line-height: 1.35;
      letter-spacing: 0;
    }

    .brand p {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.65;
    }

    .nav {
      display: grid;
      align-content: start;
      gap: 8px;
      overflow: auto;
      padding: 18px 4px;
    }

    .nav button {
      display: grid;
      grid-template-columns: 34px 1fr;
      gap: 10px;
      align-items: center;
      width: 100%;
      min-height: 50px;
      padding: 8px 10px;
      border: 1px solid transparent;
      border-radius: 8px;
      color: var(--muted);
      background: transparent;
      text-align: left;
      cursor: pointer;
    }

    .nav button:hover,
    .nav button:focus-visible {
      border-color: var(--line-strong);
      color: var(--text);
      background: rgba(255, 255, 255, 0.04);
      outline: none;
    }

    .nav button.is-active {
      border-color: color-mix(in srgb, var(--accent) 58%, transparent);
      color: var(--text);
      background: color-mix(in srgb, var(--accent) 12%, transparent);
      box-shadow: inset 3px 0 0 var(--accent);
    }

    .nav__num {
      display: grid;
      place-items: center;
      width: 30px;
      height: 30px;
      border: 1px solid currentColor;
      border-radius: 8px;
      font-size: 0.76rem;
      font-weight: 800;
    }

    .nav__label {
      min-width: 0;
      overflow-wrap: anywhere;
      font-size: 0.95rem;
      font-weight: 700;
      line-height: 1.32;
    }

    .sidebar__bottom {
      padding: 16px 8px 0;
      border-top: 1px solid var(--line);
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 0.82rem;
    }

    .progress-track {
      height: 7px;
      margin-top: 10px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
    }

    .progress-bar {
      width: 12.5%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      transition: width 220ms ease;
    }

    .main {
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-width: 0;
      min-height: 100vh;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 20px 30px;
      border-bottom: 1px solid var(--line);
      background: rgba(7, 9, 8, 0.66);
      backdrop-filter: blur(16px);
    }

    .current-topic {
      min-width: 0;
    }

    .current-topic p {
      margin: 0 0 4px;
      color: var(--accent);
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .current-topic h2 {
      margin: 0;
      overflow: hidden;
      color: var(--text);
      font-size: 1rem;
      font-weight: 800;
      line-height: 1.35;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .controls {
      display: flex;
      gap: 10px;
      flex: none;
    }

    .icon-button {
      display: grid;
      place-items: center;
      width: 42px;
      height: 42px;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.05);
      cursor: pointer;
    }

    .icon-button:hover,
    .icon-button:focus-visible {
      border-color: var(--accent);
      background: color-mix(in srgb, var(--accent) 14%, rgba(255, 255, 255, 0.05));
      outline: none;
    }

    .icon-button:disabled {
      cursor: default;
      opacity: 0.38;
    }

    .slide-wrap {
      min-width: 0;
      overflow: auto;
      padding: 28px 30px 18px;
    }

    .slide {
      display: grid;
      grid-template-columns: minmax(360px, 0.94fr) minmax(420px, 1.06fr);
      gap: 24px;
      align-items: stretch;
      max-width: 1280px;
      min-height: calc(100vh - 150px);
      margin: 0 auto;
    }

    .copy,
    .visual {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: linear-gradient(180deg, rgba(18, 24, 22, 0.9), rgba(10, 13, 12, 0.84));
      box-shadow: 0 18px 50px var(--shadow);
    }

    .copy {
      display: flex;
      flex-direction: column;
      padding: 30px;
    }

    .chapter-mark {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      max-width: 100%;
      min-height: 30px;
      padding: 5px 9px;
      border: 1px solid color-mix(in srgb, var(--accent) 40%, transparent);
      border-radius: 8px;
      color: var(--accent);
      background: color-mix(in srgb, var(--accent) 10%, transparent);
      font-size: 0.8rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .copy h2 {
      margin: 24px 0 0;
      font-size: 2.5rem;
      line-height: 1.13;
      letter-spacing: 0;
    }

    .lead {
      margin: 18px 0 0;
      color: #d6e5df;
      font-size: 1.08rem;
      line-height: 1.8;
    }

    .spotlight {
      margin: 26px 0 0;
      padding: 16px 18px;
      border-left: 4px solid var(--accent-2);
      border-radius: 8px;
      color: #fff3db;
      background: rgba(246, 185, 75, 0.11);
      font-size: 1rem;
      line-height: 1.7;
    }

    .takeaways {
      display: grid;
      gap: 12px;
      margin: 26px 0 0;
      padding: 0;
      list-style: none;
    }

    .takeaways li {
      display: grid;
      grid-template-columns: 10px 1fr;
      gap: 12px;
      align-items: start;
      color: var(--muted);
      font-size: 0.98rem;
      line-height: 1.7;
    }

    .takeaways li::before {
      content: "";
      width: 9px;
      height: 9px;
      margin-top: 9px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 18px color-mix(in srgb, var(--accent) 70%, transparent);
    }

    .speaker-cue {
      margin-top: auto;
      padding-top: 24px;
      color: var(--soft);
      font-size: 0.9rem;
      line-height: 1.65;
    }

    .speaker-cue strong {
      color: var(--text);
    }

    .visual {
      position: relative;
      overflow: hidden;
      padding: 28px;
    }

    .visual::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(120deg, color-mix(in srgb, var(--accent) 12%, transparent), transparent 44%),
        repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.035), rgba(255, 255, 255, 0.035) 1px, transparent 1px, transparent 18px);
      pointer-events: none;
    }

    .visual > * {
      position: relative;
      z-index: 1;
    }

    .visual-title {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 20px;
    }

    .visual-title h3 {
      margin: 0;
      font-size: 1.05rem;
      line-height: 1.4;
    }

    .visual-title span {
      color: var(--accent);
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .concept-map {
      position: relative;
      min-height: 430px;
    }

    .concept-map svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .concept-map line {
      stroke: color-mix(in srgb, var(--accent) 34%, transparent);
      stroke-width: 1.5;
    }

    .concept-node {
      position: absolute;
      display: grid;
      place-items: center;
      width: 118px;
      min-height: 52px;
      padding: 8px;
      border: 1px solid color-mix(in srgb, var(--accent) 42%, transparent);
      border-radius: 8px;
      color: var(--text);
      background: rgba(11, 15, 14, 0.92);
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.25);
      text-align: center;
      font-weight: 800;
      line-height: 1.25;
    }

    .concept-node small {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 600;
    }

    .concept-node--core {
      left: calc(50% - 70px);
      top: calc(50% - 48px);
      width: 140px;
      min-height: 96px;
      border-color: var(--accent);
      background: color-mix(in srgb, var(--accent) 20%, rgba(11, 15, 14, 0.92));
      font-size: 1.05rem;
    }

    .node-prompt { left: 8%; top: 7%; }
    .node-tools { right: 7%; top: 9%; }
    .node-skills { left: 7%; bottom: 13%; }
    .node-rag { right: 6%; bottom: 13%; }
    .node-mcp { left: 38%; bottom: 2%; }
    .node-agent { left: 39%; top: 1%; }

    .flow {
      display: grid;
      gap: 14px;
    }

    .flow-line {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 10px;
    }

    .flow-step {
      position: relative;
      min-height: 98px;
      padding: 14px 12px;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.045);
    }

    .flow-step strong {
      display: block;
      color: var(--text);
      font-size: 1rem;
      line-height: 1.35;
    }

    .flow-step span {
      display: block;
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.55;
    }

    .task-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 10px;
    }

    .tag {
      min-height: 46px;
      padding: 11px 12px;
      border: 1px solid color-mix(in srgb, var(--accent-2) 38%, transparent);
      border-radius: 8px;
      color: #ffe7b4;
      background: rgba(246, 185, 75, 0.1);
      font-size: 0.9rem;
      font-weight: 700;
      line-height: 1.35;
    }

    .compare {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .compare-panel {
      min-height: 335px;
      padding: 18px;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.045);
    }

    .compare-panel h4 {
      margin: 0 0 16px;
      color: var(--text);
      font-size: 1.06rem;
    }

    .metric {
      margin-top: 18px;
    }

    .metric span {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 0.84rem;
    }

    .meter {
      height: 10px;
      margin-top: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
    }

    .meter b {
      display: block;
      width: var(--value);
      height: 100%;
      border-radius: inherit;
      background: var(--fill, var(--accent));
    }

    .equation {
      margin-top: 18px;
      padding: 16px;
      border: 1px solid color-mix(in srgb, var(--accent) 35%, transparent);
      border-radius: 8px;
      color: var(--text);
      background: color-mix(in srgb, var(--accent) 11%, transparent);
      font-weight: 800;
      line-height: 1.55;
    }

    .timeline {
      display: grid;
      gap: 13px;
    }

    .timeline-row {
      display: grid;
      grid-template-columns: 96px 1fr;
      gap: 14px;
      align-items: stretch;
    }

    .timeline-row time {
      display: grid;
      place-items: center;
      min-height: 62px;
      border: 1px solid color-mix(in srgb, var(--accent) 38%, transparent);
      border-radius: 8px;
      color: var(--accent);
      background: color-mix(in srgb, var(--accent) 10%, transparent);
      font-weight: 900;
    }

    .timeline-row div {
      padding: 14px 16px;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.045);
    }

    .timeline-row strong {
      display: block;
      margin-bottom: 6px;
      color: var(--text);
      font-size: 1rem;
    }

    .timeline-row span {
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.55;
    }

    .terminal {
      margin-top: 16px;
      padding: 16px;
      border: 1px solid rgba(255, 255, 255, 0.13);
      border-radius: 8px;
      color: #c8f8df;
      background: #050706;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      font-size: 0.86rem;
      line-height: 1.7;
      overflow-x: auto;
    }

    .tool-layout {
      display: grid;
      grid-template-columns: minmax(230px, 0.92fr) minmax(250px, 1.08fr);
      gap: 16px;
      align-items: start;
    }

    .tool-matrix {
      display: grid;
      gap: 10px;
    }

    .matrix-row {
      display: grid;
      grid-template-columns: 92px 1fr;
      gap: 12px;
      min-height: 58px;
      padding: 12px;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.045);
    }

    .matrix-row strong {
      color: var(--text);
      font-size: 0.93rem;
    }

    .matrix-row span {
      color: var(--muted);
      font-size: 0.86rem;
      line-height: 1.55;
    }

    .image-panel {
      overflow: hidden;
      margin: 0;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      background: #050706;
    }

    .image-panel img {
      display: block;
      width: 100%;
      max-height: 360px;
      object-fit: contain;
      background: #0c1110;
    }

    .image-caption {
      padding: 12px 14px;
      color: var(--muted);
      font-size: 0.84rem;
      line-height: 1.55;
    }

    .image-fallback {
      display: none;
      min-height: 190px;
      padding: 22px;
      color: var(--muted);
      line-height: 1.7;
      place-items: center;
      text-align: center;
    }

    .image-panel.image-failed img {
      display: none;
    }

    .image-panel.image-failed .image-fallback {
      display: grid;
    }

    .ladder {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      align-items: stretch;
    }

    .ladder-step {
      display: grid;
      grid-template-rows: auto auto 1fr;
      min-height: 330px;
      padding: 18px;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.045);
    }

    .ladder-step b {
      color: var(--accent);
      font-size: 0.82rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .ladder-step h4 {
      margin: 12px 0 8px;
      color: var(--text);
      font-size: 1.05rem;
      line-height: 1.45;
    }

    .ladder-step p {
      margin: 0;
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.75;
    }

    .loop {
      display: grid;
      grid-template-columns: minmax(240px, 0.86fr) minmax(260px, 1.14fr);
      gap: 16px;
      align-items: center;
    }

    .loop-ring {
      position: relative;
      display: grid;
      place-items: center;
      width: min(100%, 310px);
      aspect-ratio: 1;
      margin: 0 auto;
      border: 1px solid color-mix(in srgb, var(--accent) 35%, transparent);
      border-radius: 50%;
      background:
        conic-gradient(from 0deg, var(--accent), var(--accent-2), var(--accent-3), var(--accent));
    }

    .loop-ring::before {
      content: "";
      position: absolute;
      inset: 18px;
      border-radius: 50%;
      background: #0b0f0e;
    }

    .loop-ring strong {
      position: relative;
      z-index: 1;
      max-width: 150px;
      text-align: center;
      font-size: 1.35rem;
      line-height: 1.35;
    }

    .loop-list {
      display: grid;
      gap: 10px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .loop-list li {
      padding: 13px 14px;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.045);
      line-height: 1.55;
    }

    .loop-list strong {
      color: var(--text);
    }

    .stack {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .stack-column {
      min-height: 240px;
      padding: 17px;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.045);
    }

    .stack-column h4 {
      margin: 0 0 12px;
      color: var(--text);
      font-size: 1.05rem;
    }

    .pill-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .pill-list li {
      padding: 7px 9px;
      border: 1px solid color-mix(in srgb, var(--accent) 34%, transparent);
      border-radius: 8px;
      color: var(--muted);
      background: rgba(0, 0, 0, 0.16);
      font-size: 0.82rem;
      line-height: 1.35;
    }

    .resource-strip {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    .resource-strip a {
      min-height: 52px;
      padding: 11px;
      border: 1px solid color-mix(in srgb, var(--accent-2) 36%, transparent);
      border-radius: 8px;
      color: #ffe3a4;
      background: rgba(246, 185, 75, 0.08);
      text-decoration: none;
      font-size: 0.84rem;
      font-weight: 700;
      line-height: 1.35;
    }

    .resource-strip a:hover,
    .resource-strip a:focus-visible {
      border-color: var(--accent-2);
      outline: none;
    }

    .life-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .life-item {
      min-height: 112px;
      padding: 16px;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.045);
    }

    .life-item strong {
      display: block;
      margin-bottom: 9px;
      color: var(--text);
      font-size: 1rem;
    }

    .life-item span {
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.65;
    }

    .habit-bar {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    .habit-bar div {
      min-height: 62px;
      padding: 12px;
      border: 1px solid color-mix(in srgb, var(--ok) 34%, transparent);
      border-radius: 8px;
      color: #dffbd3;
      background: rgba(141, 227, 110, 0.08);
      font-size: 0.86rem;
      font-weight: 800;
      line-height: 1.45;
    }

    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 30px 20px;
      color: var(--soft);
      font-size: 0.84rem;
    }

    .footer a {
      color: var(--muted);
      text-decoration: none;
    }

    .footer a:hover,
    .footer a:focus-visible {
      color: var(--accent);
      outline: none;
    }

    @media (max-width: 1080px) {
      .app {
        grid-template-columns: 1fr;
      }

      .sidebar {

    function renderSlide() {
      const chapter = chapters[currentIndex];
      const percent = Math.round(((currentIndex + 1) / chapters.length) * 100);

      document.documentElement.style.setProperty("--accent", chapter.accent);
      currentKicker.textContent = chapter.kicker;
      currentTitle.textContent = chapter.nav;
      progressBar.style.width = `${percent}%`;
      progressText.textContent = `第 ${currentIndex + 1} / ${chapters.length} 章`;
      progressPercent.textContent = `${percent}%`;
      prevBtn.disabled = currentIndex === 0;
      nextBtn.disabled = currentIndex === chapters.length - 1;

      [...nav.querySelectorAll("button")].forEach((button, index) => {
        const isActive = index === currentIndex;
        button.classList.toggle("is-active", isActive);
        button.setAttribute("aria-current", isActive ? "page" : "false");
      });

      slide.innerHTML = `
        <div class="copy">
          <span class="chapter-mark">${escapeHtml(chapter.kicker)} · ${String(currentIndex + 1).padStart(2, "0")}</span>
          <h2>${escapeHtml(chapter.title)}</h2>
          <p class="lead">${escapeHtml(chapter.lead)}</p>
          <div class="spotlight">${escapeHtml(chapter.spotlight)}</div>
          <ul class="takeaways">
            ${chapter.takeaways.map((item) => `<li>${escapeHtml(item)}</li>`).join("")}
          </ul>
          <p class="speaker-cue"><strong>讲述锚点：</strong>${escapeHtml(chapter.cue)}</p>
        </div>
        <div class="visual">
          ${renderVisual(chapter.visual)}
        </div>
      `;
    }

    function goTo(index) {
      currentIndex = Math.max(0, Math.min(index, chapters.length - 1));
      renderSlide();
    }

    prevBtn.addEventListener("click", () => goTo(currentIndex - 1));
    nextBtn.addEventListener("click", () => goTo(currentIndex + 1));

    window.addEventListener("keydown", (event) => {
      if (event.defaultPrevented) return;
      const tag = document.activeElement && document.activeElement.tagName;
      if (tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT") return;

      if (event.key === "ArrowLeft" || event.key === "PageUp") {
        event.preventDefault();
        goTo(currentIndex - 1);
      }

      if (event.key === "ArrowRight" || event.key === "PageDown" || event.key === " ") {
        event.preventDefault();
        goTo(currentIndex + 1);
      }

      if (event.key === "Home") {
        event.preventDefault();
        goTo(0);
      }

      if (event.key === "End") {
        event.preventDefault();
        goTo(chapters.length - 1);
      }
    });

    renderNav();
    renderSlide();
  </script>
